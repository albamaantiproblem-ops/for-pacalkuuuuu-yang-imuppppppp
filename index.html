<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halo Sayangku ♡</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e, #ff6b9d, #a1c4fd);
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        h1 {
            font-size: 2.8em;
            margin-top: 12vh;
            text-shadow: 0 0 25px rgba(255,255,255,0.95);
        }
        .name {
            font-size: 2.1em;
            margin: 8px 0 25px;
            letter-spacing: 1px;
        }
        .photo {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            object-fit: cover;
            border: 10px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin: 15px auto;
            display: block;
        }
        button {
            margin-top: 10px;
            padding: 14px 45px;
            font-size: 1.45em;
            background: white;
            color: #ff4d94;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .small-text {
            margin-top: 18px;
            font-size: 0.95em;
            opacity: 0.9;
            font-style: italic;
            padding: 0 20px;
        }

        /* Animasi yang jelas di HP */
        .flying {
            position: absolute;
            animation: flyUp 14s linear infinite;
            z-index: 1;
        }
        .flying-bear { font-size: 48px; }
        .flying-photo { 
            width: 58px; 
            height: 58px; 
            border-radius: 50%; 
            border: 3px solid white; 
            object-fit: cover; 
        }
        .flying-heart { font-size: 38px; color: #ff3366; }

        @keyframes flyUp {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-160px) rotate(45deg); }
        }
    </style>
</head>
<body>
    <h1>Halo Sayangku ♡</h1>
    <p class="name">Vina Regina Putri</p>
    
    <img src="sayangkuu.jpeg" class="photo" alt="Vina">
    
    <button onclick="nextPage()">Lanjut Sayang ♡</button>
    <p class="small-text">web iniii forr uuu dariii akuu dari hati kuu hihihi i loveyuu 💕</p>

    <script>
        // Beruang
        for(let i = 0; i < 12; i++) {
            let bear = document.createElement('div');
            bear.className = 'flying flying-bear';
            bear.textContent = '🧸';
            bear.style.left = Math.random() * 100 + 'vw';
            bear.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(bear);
        }

        // Foto Vina
        for(let i = 0; i < 10; i++) {
            let photo = document.createElement('img');
            photo.src = "sayangkuu.jpeg";
            photo.className = 'flying flying-photo';
            photo.style.left = Math.random() * 100 + 'vw';
            photo.style.animationDelay = Math.random() * 9 + 's';
            document.body.appendChild(photo);
        }

        // Love
        for(let i = 0; i < 25; i++) {
            let heart = document.createElement('div');
            heart.className = 'flying flying-heart';
            heart.textContent = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 8 + 's';
            document.body.appendChild(heart);
        }

        function nextPage() {
            alert("Lanjut ke game kecil yuk sayang? 💕");
        }
    </script>
</body>
</html>
